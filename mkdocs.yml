site_name: Knowledge Base
site_description: Personal knowledge repository and project analysis
site_author: mufans

nav:
  - Home: index.md
  - Wiki:
    - Concepts: wiki/concepts/
    - Entities: wiki/entities/
    - Sources: wiki/sources/
    - Syntheses: wiki/syntheses/
  - Raw:
    - Inbox: raw/inbox/
    - Projects: raw/projects/

theme:
  name: material
  palette:
    primary: blue
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.highlight
    - search.share

plugins:
  - search
  - git-revision-date-localized:
      type: date
      locale: zh
      fallback_to_build_date: true

markdown_extensions:
  - toc:
      permalink: true
  - meta
  - admonition
  - attr_list
  - md_in_html
