theme:
  name: material
  palette:
    primary: blue
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.highlight
    - search.share

plugins:
  - search
  - git-revision-date-localized:
      type: date
      locale: zh
      fallback_to_build_date: true

markdown_extensions:
  - toc:
      permalink: true
  - meta
  - admonition
  - attr_list
  - md_in_html
