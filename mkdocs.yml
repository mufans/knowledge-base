site_name: Knowledge Base
site_url: https://mufans.github.io/knowledge-base
repo_url: https://github.com/mufans/knowledge-base
docs_dir: docs

theme:
  name: material
  language: zh
  features:
    - search
    - search.suggest
    - search.highlight
  palette:
    primary: indigo

plugins:
  - search

markdown_extensions:
  - toc:
      permalink: true
