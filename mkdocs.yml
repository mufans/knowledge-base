site_name: Knowledge Base
site_description: Personal knowledge repository and project analysis
site_author: mufans

nav:
  - Home: index.md
  - Projects:
    - Project Index: projects/
    - $(find docs/projects/ -name "*.md" -type f | sed 's|docs/projects/||' | sed 's|.md||' | sed 's|^|- |' | sort)
  - Topics:
    - Topic Index: topics/
    - $(find docs/topics/ -name "*.md" -type f | sed 's|docs/topics/||' | sed 's|.md||' | sed 's|^|- |' | sort)
  - Inbox:
    - Daily Logs: inbox/
    - Archives: inbox/archive/

theme:
  name: material
  palette:
    primary: blue
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share

plugins:
  - search
  - git-revision-date-localized:
      type: date
      locale: zh
      fallback_to_build_date: true

markdown_extensions:
  - toc:
      permalink: true
  - meta
  - admonition
  - attr_list
  - md_in_html
