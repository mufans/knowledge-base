{% extends "base.html" %}

{% block extrahead %}
  <link rel="stylesheet" href="{{ 'overrides/styles/dashboard.css' | url }}">
{% endblock %}

{% block libs %}
{{ super() }}
<script src="{{ 'overrides/dashboard-data.js' | url }}"></script>
{% endblock %}

{% block content %}
{% set page = page %}
{% set nav = nav %}
{{ super() }}
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
document.addEventListener('DOMContentLoaded', function() {
  // 只在首页生效
  const contentEl = document.querySelector('.md-content__inner');
  if (!contentEl) return;

  // 检查是否是首页（Home）
  const isHome = document.location.pathname === '/' ||
                 document.location.pathname === '/index.html' ||
                 document.location.pathname.endsWith('/knowledge/') ||
                 document.location.pathname.endsWith('/knowledge/index.html');
  if (!isHome) return;

  // 从 site.data 或页面数据构建文章列表
  // MkDocs Material 不会自动暴露所有页面的 frontmatter，
  // 所以我们用一个内联的数据对象
  const articles = window.__kb_articles || [];
  if (articles.length === 0) return;

  // 构建分类数据
  const categories = {
    all: { label: '全部', count: articles.length },
    concepts: { label: 'Concepts', count: 0 },
    entities: { label: 'Entities', count: 0 },
    sources: { label: 'Sources', count: 0 },
    syntheses: { label: 'Syntheses', count: 0 }
  };

  const tagSet = new Set();
  articles.forEach(a => {
    if (categories[a.category]) categories[a.category].count++;
    (a.tags || []).forEach(t => tagSet.add(t));
  });

  // 问候语
  const hour = new Date().getHours();
  let greeting = '晚上好';
  if (hour >= 5 && hour < 12) greeting = '早上好';
  else if (hour >= 12 && hour < 18) greeting = '下午好';

  // 构建统计 HTML
  const statsHtml = Object.entries(categories).map(([key, val]) =>
    `<div class="kb-stat"><span class="kb-stat-num">${val.count}</span><span>${val.label}</span></div>`
  ).join('');

  // 构建筛选按钮
  const filtersHtml = Object.entries(categories).map(([key, val]) =>
    `<button class="kb-filter-btn${key === 'all' ? ' active' : ''}" data-filter="${key}">${val.label} (${val.count})</button>`
  ).join('');

  // 构建排序按钮
  const sortHtml = `
    <div class="kb-sort-bar">
      <span>排序：</span>
      <button class="kb-sort-btn active" data-sort="rating">评分 ↓</button>
      <button class="kb-sort-btn" data-sort="date">最新</button>
      <button class="kb-sort-btn" data-sort="name">名称</button>
    </div>
  `;

  // 构建卡片
  function renderCards(items) {
    if (items.length === 0) {
      return '<div class="kb-no-results">没有找到匹配的文章</div>';
    }
    return items.map(a => `
      <a class="kb-card" href="${a.url}">
        <div class="kb-card-header">
          <span class="kb-card-category ${a.category}">${categories[a.category]?.label || a.category}</span>
          <span class="kb-card-rating">★ ${a.rating || '-'}</span>
        </div>
        <h3 class="kb-card-title">${a.title}</h3>
        <p class="kb-card-desc">${a.description || ''}</p>
        <div class="kb-card-tags">
          ${(a.tags || []).map(t => `<span class="kb-card-tag">${t}</span>`).join('')}
        </div>
        ${a.date ? `<div class="kb-card-date">${a.date}</div>` : ''}
      </a>
    `).join('');
  }

  // 组装 Dashboard
  const dashboardHtml = `
    <div class="kb-dashboard">
      <div class="kb-greeting">
        <h1>${greeting}，知识探索者！</h1>
        <p>共收录 ${articles.length} 篇知识文章，持续更新中</p>
      </div>
      <div class="kb-search">
        <input type="text" id="kb-search-input" placeholder="搜索文章标题、描述或标签...">
      </div>
      <div class="kb-filters" id="kb-filters">${filtersHtml}</div>
      ${sortHtml}
      <div class="kb-cards" id="kb-cards">${renderCards(articles)}</div>
    </div>
  `;

  // 替换首页内容
  contentEl.innerHTML = dashboardHtml;

  // 筛选逻辑
  let currentFilter = 'all';
  let currentSort = 'rating';
  let searchTerm = '';

  function getFiltered() {
    let items = articles;
    if (currentFilter !== 'all') {
      items = items.filter(a => a.category === currentFilter);
    }
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      items = items.filter(a =>
        (a.title || '').toLowerCase().includes(q) ||
        (a.description || '').toLowerCase().includes(q) ||
        (a.tags || []).some(t => t.toLowerCase().includes(q))
      );
    }
    // 排序
    if (currentSort === 'rating') {
      items.sort((a, b) => (b.rating || 0) - (a.rating || 0));
    } else if (currentSort === 'date') {
      items.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    } else if (currentSort === 'name') {
      items.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
    }
    return items;
  }

  function refresh() {
    document.getElementById('kb-cards').innerHTML = renderCards(getFiltered());
  }

  // 事件绑定
  document.getElementById('kb-filters').addEventListener('click', function(e) {
    if (!e.target.classList.contains('kb-filter-btn')) return;
    this.querySelectorAll('.kb-filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    refresh();
  });

  document.getElementById('kb-search-input').addEventListener('input', function(e) {
    searchTerm = e.target.value;
    refresh();
  });

  document.querySelector('.kb-sort-bar').addEventListener('click', function(e) {
    if (!e.target.classList.contains('kb-sort-btn')) return;
    this.querySelectorAll('.kb-sort-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentSort = e.target.dataset.sort;
    refresh();
  });
});
</script>
{% endblock %}
